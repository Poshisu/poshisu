name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  app-gates:
    name: App gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy-publishable-key-for-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit and component tests
        run: pnpm run test

      - name: Prompt eval baseline
        run: pnpm run eval:prompts

      - name: Build
        run: pnpm run build

  docker-gates:
    name: DB types and scoped E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: app-gates
    env:
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.92.1

      - name: Start Supabase local stack
        run: supabase start

      - name: Export Supabase local env
        shell: bash
        run: |
          set -euo pipefail
          supabase status -o env > /tmp/supabase.env
          api_url=$(grep '^API_URL=' /tmp/supabase.env | cut -d= -f2-)
          anon_key=$(grep '^ANON_KEY=' /tmp/supabase.env | cut -d= -f2-)
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$api_url"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$anon_key"
          } >> "$GITHUB_ENV"

      - name: Check generated DB types are current
        run: pnpm run db:types:check

      - name: Upload generated DB types on drift
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: generated-database-types
          path: /tmp/poshisu-generated-database.ts
          if-no-files-found: ignore

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Scoped auth/onboarding E2E
        run: pnpm run test:e2e:ci
